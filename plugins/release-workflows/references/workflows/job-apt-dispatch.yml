# apt-dispatch: fire a repository_dispatch at an apt-repo receiver so it
# picks up the newly-published .debs and republishes its package index.
#
# The receiver repo is another repo you (or someone else) maintains; it
# listens for a `repository_dispatch` event of a specific type and
# republishes apt metadata. This job's job is just to notify.
#
# Substitution placeholders:
#   <APT_RECEIVER_REPO>      — `<owner>/<repo>` of the receiver, e.g.
#                              `charliek/apt-charliek`
#   <APT_EVENT_TYPE>         — the event_type the receiver listens for,
#                              e.g. `publish`
#   <APT_PACKAGE>            — your package's name as the receiver knows
#                              it, e.g. `roost`
#   <APT_DISPATCH_TOKEN>     — a PAT or fine-grained token in the
#                              maintainer's account with
#                              `repository_dispatch: write` on the
#                              receiver repo. Set as a repo secret
#                              named `APT_DISPATCH_TOKEN`.
#
# If the receiver doesn't exist or the token isn't set, this job
# downgrades to a workflow notice rather than failing the release. The
# receiver should self-heal on its next scheduled re-scan if it's set
# up that way. Adjust the failure semantics here if your receiver
# doesn't self-heal.

apt-dispatch:
  needs: linux            # the job that built and uploaded the .debs
  runs-on: ubuntu-latest
  steps:
    - name: Dispatch <APT_RECEIVER_REPO> publish
      env:
        GH_TOKEN: ${{ secrets.APT_DISPATCH_TOKEN }}
        TOKEN_SET: ${{ secrets.APT_DISPATCH_TOKEN != '' }}
      run: |
        set -euo pipefail
        tag="${GITHUB_REF_NAME}"
        case "${tag}" in
          *-*)
            echo "::notice::${tag} is a prerelease — skipping <APT_RECEIVER_REPO> dispatch."
            exit 0
            ;;
        esac
        if [ "${TOKEN_SET}" != "true" ]; then
          echo "::warning::APT_DISPATCH_TOKEN not set — skipping dispatch. <APT_RECEIVER_REPO> can self-heal on its next scheduled run if it re-scans."
          exit 0
        fi
        gh api "repos/<APT_RECEIVER_REPO>/dispatches" --method POST \
          -f event_type=<APT_EVENT_TYPE> \
          -F "client_payload[package]=<APT_PACKAGE>" \
          -F "client_payload[tag]=${tag}"
        echo "::notice::Dispatched <APT_RECEIVER_REPO> publish for <APT_PACKAGE> ${tag}."
